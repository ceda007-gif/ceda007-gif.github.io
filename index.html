<html lang="es">
<head>

        /* Estilos generales */
        body, html {
            margin: 0;

        }

        /* Barra de navegación */
        header {
            background-color: #fff;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #d4af37;
            text-decoration: none;
        }
        nav a {

            text-decoration: none;
            color: #555;
            font-weight: 500;
        }
        nav a:hover {
            color: #d4af37;
        }

        /* Imagen principal (Hero) */
        .hero {
            background-size: cover;
            background-position: center;
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            transition: background-image 0.5s ease-in-out;
        }
        .hero h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }
        .hero p {
            font-size: 20px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
        }

        /* Barra de Reservas */
        .booking-bar {
            background-color: #fff;
            padding: 20px;
            margin: -30px auto 40px auto;
            width: 80%;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }
        .booking-field {
            display: flex;
            flex-direction: column;
        }
        .booking-field label {
            font-size: 12px;
            text-transform: uppercase;
            color: #777;
            margin-bottom: 5px;
        }
        .booking-field input, .booking-field select {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .btn-book {
            background-color: #d4af37;
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }
        .btn-book:hover {
            background-color: #b5952f;
        }

        /* Sección de Contenido */
        .content {
            padding: 40px 10%;
            text-align: center;
        }
        .content h2 {
            font-size: 32px;
            color: #222;
            margin-bottom: 20px;
        }

        .rooms-grid {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
        }
        .room-card {
            background: #fff;
            width: 300px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: left;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .room-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .room-card h3 {
            margin: 15px 15px 5px 15px;
            font-size: 20px;
        }
        .room-card p {
            padding: 0 15px;
            color: #666;
            font-size: 14px;
            flex-grow: 1;
        }

        }

            font-weight: bold;

            font-size: 18px;
